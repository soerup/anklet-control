<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Anklet</title>
<style>
  :root{
    --bg:#0b0d12; --card:#141824; --line:#242b3b;
    --txt:#eef1f8; --dim:#7f8aa3; --accent:#ff4d2e; --live:#37e6b0; --violet:#b06bff;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:radial-gradient(120% 55% at 50% -10%, #17203a 0%, var(--bg) 55%);
    color:var(--txt); min-height:100vh;
    font:16px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    padding:max(16px,env(safe-area-inset-top)) 16px 20px;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
  }

  /* compact top bar: status on the left, connect on the right */
  .bar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px}
  .left{display:flex; align-items:center; gap:10px; min-width:0}
  .ttl{font-size:18px; font-weight:680; letter-spacing:-.3px; line-height:1}
  .status{font-size:12px; color:var(--dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .dot{width:10px; height:10px; border-radius:50%; background:#39415a; flex:0 0 auto}
  .dot.live{background:var(--live); box-shadow:0 0 0 0 var(--live); animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(55,230,176,.5)}70%{box-shadow:0 0 0 7px rgba(55,230,176,0)}100%{box-shadow:0 0 0 0 rgba(55,230,176,0)}}
  .connect{flex:0 0 auto; background:var(--accent); color:#fff; font-weight:640; font-size:15px;
    padding:11px 18px; border:none; border-radius:12px; cursor:pointer}
  .connect.on{background:transparent; border:1px solid var(--line); color:var(--dim)}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:11px}
  .lab{font-size:11px; text-transform:uppercase; letter-spacing:1.3px; color:var(--dim); margin:0 0 11px}
  button{font:inherit; color:var(--txt); border:none; cursor:pointer}

  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
  .pat{padding:0 4px; min-height:50px; border-radius:12px; border:1px solid var(--line); background:#191f2e;
    font-weight:600; font-size:14px; text-align:center; transition:.12s;
    display:flex; align-items:center; justify-content:center}
  .pat.sel{border-color:var(--accent); color:var(--accent); background:#22140f}
  .side .pat.sel{border-color:var(--violet); color:var(--violet); background:#1c1430}
  .pat.off.sel, .side .pat.off.sel{border-color:var(--dim); color:var(--txt); background:#20242e}

  .slabel{display:flex; justify-content:space-between; color:var(--dim); font-size:13px; margin:14px 0 9px}
  .slabel:first-of-type{margin-top:2px}
  .slabel b{color:var(--txt); font-weight:600; font-variant-numeric:tabular-nums; font-size:15px}
  input[type=range]{ -webkit-appearance:none; appearance:none; width:100%; height:44px; background:transparent; margin:0 }
  input[type=range]::-webkit-slider-runnable-track{ height:15px; border-radius:8px; background:#2a3446 }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:42px; height:42px; border-radius:50%;
    background:var(--accent); margin-top:-13px; border:3px solid var(--bg); box-shadow:0 3px 10px rgba(0,0,0,.55) }
  input[type=range]::-moz-range-track{ height:15px; border-radius:8px; background:#2a3446 }
  input[type=range]::-moz-range-thumb{ width:42px; height:42px; border-radius:50%; background:var(--accent);
    border:3px solid var(--bg); box-shadow:0 3px 10px rgba(0,0,0,.55) }

  #stack [disabled]{opacity:.35; pointer-events:none}
</style>
</head>
<body>
  <div class="bar">
    <div class="left">
      <span id="dot" class="dot"></span>
      <div style="min-width:0">
        <div class="ttl">Marius Borg Høiby</div>
        <div id="status" class="status">Not connected</div>
      </div>
    </div>
    <button id="connect" class="connect">Connect</button>
  </div>

  <div id="stack">
    <div class="card" data-panel disabled>
      <p class="lab">Main effect &middot; 6 LEDs</p>
      <div class="grid">
        <button class="pat" data-p="0">All</button>
        <button class="pat" data-p="1">Chase</button>
        <button class="pat" data-p="2">Comet</button>
        <button class="pat" data-p="3">Bounce</button>
        <button class="pat" data-p="4">Sparkle</button>
        <button class="pat" data-p="5">Alt</button>
        <button class="pat" data-p="6">Wave</button>
        <button class="pat" data-p="7">Build</button>
        <button class="pat off" data-p="8">Off</button>
      </div>
    </div>

    <div class="card side" data-panel disabled>
      <p class="lab">Side LED &middot; purple</p>
      <div class="grid">
        <button class="pat sd" data-s="1">50 / 50</button>
        <button class="pat sd" data-s="2">F-F-S</button>
        <button class="pat sd" data-s="3">Strobe</button>
        <button class="pat sd" data-s="4">Breathe</button>
        <button class="pat sd" data-s="5">SOS</button>
        <button class="pat sd off" data-s="0">Off</button>
      </div>
    </div>

    <div class="card" data-panel disabled>
      <p class="lab">Adjust &middot; both</p>
      <div class="slabel">Brightness <b id="bval">120</b></div>
      <input id="bright" type="range" min="0" max="255" value="120">
      <div class="slabel">Speed <b id="sval">128</b></div>
      <input id="speed" type="range" min="8" max="255" value="128">
    </div>
  </div>

<script>
  const SVC = '19b10000-e8f2-537e-4f6c-d104768a1214';
  const U = {
    pattern:'19b10001-e8f2-537e-4f6c-d104768a1214',
    bright: '19b10002-e8f2-537e-4f6c-d104768a1214',
    speed:  '19b10004-e8f2-537e-4f6c-d104768a1214',
    side:   '19b10005-e8f2-537e-4f6c-d104768a1214'
  };
  const $ = id => document.getElementById(id);
  let device, ch = {};

  function enable(on){ document.querySelectorAll('[data-panel]').forEach(p =>
    on ? p.removeAttribute('disabled') : p.setAttribute('disabled','')); }
  function setConn(live){
    $('dot').classList.toggle('live', live);
    $('status').textContent = live ? (device && device.name || 'Connected') : 'Not connected';
    $('connect').textContent = live ? 'Disconnect' : 'Connect';
    $('connect').classList.toggle('on', live);
    enable(live);
  }
  function uiPattern(p){ document.querySelectorAll('.pat[data-p]').forEach(b => b.classList.toggle('sel', +b.dataset.p === p)); }
  function uiSide(s){ document.querySelectorAll('.pat[data-s]').forEach(b => b.classList.toggle('sel', +b.dataset.s === s)); }

  async function connect(){
    try{
      device = await navigator.bluetooth.requestDevice({ filters:[{ services:[SVC] }] });
      device.addEventListener('gattserverdisconnected', () => setConn(false));
      const srv = await device.gatt.connect();
      const s = await srv.getPrimaryService(SVC);
      ch.pattern = await s.getCharacteristic(U.pattern);
      ch.bright  = await s.getCharacteristic(U.bright);
      ch.speed   = await s.getCharacteristic(U.speed);
      ch.side    = await s.getCharacteristic(U.side);

      uiPattern((await ch.pattern.readValue()).getUint8(0));
      uiSide((await ch.side.readValue()).getUint8(0));
      const b = (await ch.bright.readValue()).getUint8(0); $('bright').value = b; $('bval').textContent = b;
      const sp = (await ch.speed.readValue()).getUint8(0); $('speed').value = sp; $('sval').textContent = sp;

      await ch.pattern.startNotifications();
      ch.pattern.addEventListener('characteristicvaluechanged', e => uiPattern(e.target.value.getUint8(0)));
      await ch.side.startNotifications();
      ch.side.addEventListener('characteristicvaluechanged', e => uiSide(e.target.value.getUint8(0)));

      setConn(true);
    }catch(err){ if(err.name !== 'NotFoundError') $('status').textContent = err.message; }
  }

  async function writeByte(c, v){ try{ if(c) await c.writeValue(Uint8Array.of(v & 255)); }catch(e){} }
  function throttle(fn, ms){ let last = 0, t; return v => {
    const now = Date.now();
    if(now - last >= ms){ last = now; fn(v); }
    else { clearTimeout(t); t = setTimeout(() => { last = Date.now(); fn(v); }, ms); }
  };}
  const wBright = throttle(v => writeByte(ch.bright, v), 40);
  const wSpeed  = throttle(v => writeByte(ch.speed,  v), 40);

  $('connect').onclick = () =>
    (device && device.gatt.connected) ? device.gatt.disconnect() : connect();
  document.querySelectorAll('.pat[data-p]').forEach(b =>
    b.onclick = () => { const p = +b.dataset.p; uiPattern(p); writeByte(ch.pattern, p); });
  document.querySelectorAll('.pat[data-s]').forEach(b =>
    b.onclick = () => { const s = +b.dataset.s; uiSide(s); writeByte(ch.side, s); });
  $('bright').oninput = e => { $('bval').textContent = e.target.value; wBright(+e.target.value); };
  $('speed').oninput  = e => { $('sval').textContent = e.target.value; wSpeed(+e.target.value); };

  if(!navigator.bluetooth) $('status').textContent = 'No Web Bluetooth — open in Bluefy';
</script>
</body>
</html>
